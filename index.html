<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bingo IA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0e1420;
    --ink-soft:#161f30;
    --paper:#f4f1ea;
    --line:#2a3548;
    --text-dim:#93a1b8;

    --c1:#159a86;   /* cartón 1 - verde azulado */
    --c1-deep:#0d5f52;
    --c2:#e07a1f;   /* cartón 2 - naranja */
    --c2-deep:#9a4e0e;
    --c3:#2f74b0;   /* cartón 3 - azul */
    --c3-deep:#1c4670;
    --c4:#f0a400;   /* cartón 4 - ámbar */
    --c4-deep:#9c6a00;
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(circle at 15% 10%, rgba(255,255,255,0.05), transparent 40%),
      var(--ink);
    background-image:
      linear-gradient(rgba(255,255,255,0.035) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.035) 1px, transparent 1px),
      radial-gradient(circle at 15% 10%, rgba(255,255,255,0.05), transparent 40%);
    background-size: 42px 42px, 42px 42px, 100% 100%;
    color:var(--paper);
    font-family:'Inter', sans-serif;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:32px 18px 60px;
  }

  .wrap{width:100%;max-width:980px;}

  header.top{
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    gap:16px;
    margin-bottom:8px;
    flex-wrap:wrap;
  }
  .brand{
    font-family:'Space Grotesk',sans-serif;
    font-weight:700;
    font-size:clamp(2rem, 5vw, 2.8rem);
    letter-spacing:-0.02em;
    display:flex;
    align-items:baseline;
    gap:10px;
  }
  .brand .ia{
    font-family:'IBM Plex Mono',monospace;
    font-size:0.42em;
    font-weight:600;
    padding:4px 10px;
    border:1.5px solid var(--paper);
    border-radius:5px;
    letter-spacing:0.08em;
  }
  .tagline{
    font-family:'IBM Plex Mono',monospace;
    font-size:0.75rem;
    color:var(--text-dim);
    letter-spacing:0.04em;
  }

  /* ---------- SELECTOR ---------- */
  #selector{ margin-top:26px; }
  .prompt{
    font-family:'Space Grotesk',sans-serif;
    font-size:1.15rem;
    font-weight:600;
    margin:0 0 30px;
    color:var(--paper);
  }
  .prompt span{color:var(--text-dim);font-weight:400;font-family:'Inter',sans-serif;font-size:0.95rem;display:block;margin-top:4px;}

  .tickets{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:26px 22px;
    padding-top:8px;
  }

  .ticket{
    --tc: var(--c1);
    --tcd: var(--c1-deep);
    position:relative;
    width:190px;
    background:var(--ink-soft);
    border:1px solid var(--line);
    border-radius:14px;
    padding:20px 16px 22px;
    cursor:pointer;
    text-align:left;
    color:var(--paper);
    font:inherit;
    transition:transform .25s ease, box-shadow .25s ease, border-color .25s ease;
    transform:rotate(var(--rot,0deg));
    overflow:hidden;
  }
  .ticket:nth-child(1){--tc:var(--c1);--tcd:var(--c1-deep);--rot:-3deg;}
  .ticket:nth-child(2){--tc:var(--c2);--tcd:var(--c2-deep);--rot:-1deg;}
  .ticket:nth-child(3){--tc:var(--c3);--tcd:var(--c3-deep);--rot:1.5deg;}
  .ticket:nth-child(4){--tc:var(--c4);--tcd:var(--c4-deep);--rot:3deg;}

  .ticket::before{
    content:"";
    position:absolute;
    top:0; left:0; right:0; height:6px;
    background:var(--tc);
  }
  .ticket::after{
    content:"";
    position:absolute;
    right:-9px; top:50%;
    width:18px;height:18px;
    background:var(--ink);
    border:1px solid var(--line);
    border-radius:50%;
    transform:translateY(-50%);
  }
  .ticket:hover, .ticket:focus-visible{
    transform:rotate(0deg) translateY(-6px);
    border-color:var(--tc);
    box-shadow:0 14px 28px -10px rgba(0,0,0,.55);
    z-index:2;
    outline:none;
  }
  .ticket .num{
    font-family:'IBM Plex Mono',monospace;
    font-size:0.68rem;
    color:var(--text-dim);
    letter-spacing:0.05em;
  }
  .ticket .digit{
    font-family:'Space Grotesk',sans-serif;
    font-weight:700;
    font-size:2.6rem;
    color:var(--tc);
    line-height:1;
    margin:6px 0 14px;
  }
  .ticket .mini-grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:4px;
    margin-bottom:14px;
  }
  .ticket .mini-grid i{
    display:block;
    aspect-ratio:1;
    border-radius:3px;
    background:rgba(255,255,255,.06);
  }
  .ticket .mini-grid i.on{ background:var(--tc); }
  .ticket .cta{
    font-family:'IBM Plex Mono',monospace;
    font-size:0.72rem;
    font-weight:600;
    letter-spacing:0.04em;
    color:var(--tc);
    display:flex;
    align-items:center;
    gap:6px;
  }
  .ticket .cta::after{ content:"→"; transition:transform .2s ease; }
  .ticket:hover .cta::after{ transform:translateX(4px); }

  /* ---------- CARD VIEW ---------- */
  #cardview{ display:none; margin-top:18px; }
  .card-header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:14px;
    margin-bottom:18px;
  }
  .back-btn{
    font-family:'IBM Plex Mono',monospace;
    font-size:0.75rem;
    color:var(--text-dim);
    background:none;
    border:1px solid var(--line);
    border-radius:8px;
    padding:9px 14px;
    cursor:pointer;
    transition:.2s;
  }
  .back-btn:hover{ color:var(--paper); border-color:var(--paper); }

  .card-title{
    font-family:'Space Grotesk',sans-serif;
    font-weight:700;
    font-size:1.5rem;
  }
  .card-num{
    font-family:'IBM Plex Mono',monospace;
    font-size:0.85rem;
    color:var(--card-c, var(--c1));
    letter-spacing:.03em;
  }

  .board{
    position:relative;
    background:var(--ink-soft);
    border:1px solid var(--line);
    border-radius:18px;
    padding:22px;
    box-shadow:0 20px 50px -20px rgba(0,0,0,.6);
  }
  .board::before{
    content:"";
    position:absolute; inset:0;
    border-radius:18px;
    padding:1px;
    background:linear-gradient(135deg, var(--card-c,var(--c1)), transparent 45%);
    mask:linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
    -webkit-mask:linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
    -webkit-mask-composite:xor;
    mask-composite:exclude;
    pointer-events:none;
    opacity:.6;
  }

  .grid3{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    grid-template-rows:repeat(3,1fr);
    gap:10px;
  }

  .cell{
    position:relative;
    min-height:150px;
    border-radius:12px;
    padding:14px 12px 12px;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
    background:rgba(255,255,255,.03);
    border:1px solid var(--line);
    transition:border-color .3s ease, background .3s ease, transform .3s ease;
  }
  .cell.task .task-text, .cell.wild .task-text{
    font-size:0.86rem;
    line-height:1.32;
    font-weight:500;
  }
  .cell.wild .task-text{ color:var(--text-dim); font-style:italic; }

  .cell input{
    width:100%;
    background:rgba(255,255,255,.04);
    border:1px solid var(--line);
    border-radius:7px;
    padding:8px 9px;
    color:var(--paper);
    font-family:'Inter',sans-serif;
    font-size:0.85rem;
    outline:none;
    transition:border-color .2s ease, background .2s ease;
  }
  .cell input::placeholder{ color:var(--text-dim); opacity:.7; }
  .cell input:focus{ border-color:var(--card-c,var(--c1)); background:rgba(255,255,255,.07); }

  .cell .caption{
    font-family:'IBM Plex Mono',monospace;
    font-size:0.62rem;
    color:var(--text-dim);
    text-align:center;
    letter-spacing:.03em;
  }

  .cell.filled{
    border-color:var(--card-c,var(--c1));
    background:rgba(255,255,255,.05);
  }
  .cell.filled input{ border-color:var(--card-c,var(--c1)); }

  .cell.free{
    background:var(--card-c,var(--c1));
    border-color:var(--card-c,var(--c1));
    align-items:center;
    justify-content:center;
  }
  .cell.free .free-mark{
    font-family:'Space Grotesk',sans-serif;
    font-weight:700;
    font-size:1.5rem;
    color:rgba(14,20,32,.55);
    letter-spacing:.02em;
  }

  .cell.line-hit{
    animation:pulse 1.1s ease infinite;
  }
  @keyframes pulse{
    0%,100%{ box-shadow:0 0 0 0 var(--card-c,var(--c1)); }
    50%{ box-shadow:0 0 0 5px color-mix(in srgb, var(--card-c,var(--c1)) 35%, transparent); }
  }

  .board-foot{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-top:18px;
    gap:12px;
    flex-wrap:wrap;
  }
  .progress-label{
    font-family:'IBM Plex Mono',monospace;
    font-size:0.72rem;
    color:var(--text-dim);
  }
  .reset-btn{
    font-family:'IBM Plex Mono',monospace;
    font-size:0.72rem;
    color:var(--paper);
    background:none;
    border:1px solid var(--line);
    padding:8px 13px;
    border-radius:8px;
    cursor:pointer;
    transition:.2s;
  }
  .reset-btn:hover{ border-color:var(--card-c,var(--c1)); color:var(--card-c,var(--c1)); }

  .bingo-banner{
    display:none;
    margin-top:16px;
    padding:14px 18px;
    border-radius:12px;
    background:var(--card-c,var(--c1));
    color:var(--ink);
    font-family:'Space Grotesk',sans-serif;
    font-weight:700;
    font-size:1.05rem;
    text-align:center;
    letter-spacing:.02em;
  }
  .bingo-banner.show{ display:block; animation:pop .35s ease; }
  @keyframes pop{ from{ transform:scale(.92); opacity:0;} to{ transform:scale(1); opacity:1;} }

  footer.sig{
    margin-top:44px;
    font-family:'IBM Plex Mono',monospace;
    font-size:0.68rem;
    color:var(--text-dim);
    text-align:center;
    letter-spacing:.03em;
  }

  @media (max-width:640px){
    .grid3{ gap:8px; }
    .cell{ min-height:130px; padding:11px 9px 9px; }
    .ticket{ width:44%; }
  }
</style>
</head>
<body>

<div class="wrap">
  <header class="top">
    <div class="brand">Bingo <span class="ia">IA</span></div>
    <div class="tagline">Plan Ceibal · Fundación Sadosky · Program.AR</div>
  </header>

  <!-- SELECTOR -->
  <section id="selector">
    <p class="prompt">Elegí tu cartón
      <span>Cada cartón tiene consignas distintas. Buscá en el grupo quién hizo cada cosa y anotá su nombre.</span>
    </p>
    <div class="tickets" id="tickets"></div>
  </section>

  <!-- CARD VIEW -->
  <section id="cardview">
    <div class="card-header">
      <button class="back-btn" id="backBtn">← elegir otro cartón</button>
      <div style="text-align:right;">
        <div class="card-title" id="cardTitle">Bingo IA</div>
        <div class="card-num" id="cardNum">Cartón N° 0000000</div>
      </div>
    </div>

    <div class="board" id="board">
      <div class="grid3" id="grid"></div>
    </div>

    <div class="board-foot">
      <span class="progress-label" id="progressLabel">0 / 9 completados</span>
      <button class="reset-btn" id="resetBtn">Reiniciar cartón</button>
    </div>

    <div class="bingo-banner" id="bingoBanner">¡Bingo! Completaste una línea 🎉</div>
  </section>

  <footer class="sig">cartón digital · hecho para jugarse en clase</footer>
</div>

<script>
  // ---------- DATA ----------
  const CARDS = [
    {
      id: 1, num: '0000001', color: 'var(--c1)',
      cells: [
        { type:'task', text:'Consultar el pronóstico del tiempo de una página o una aplicación' },
        { type:'free' },
        { type:'task', text:'Convertir voz a texto para mandar un mensaje' },
        { type:'task', text:'Ver el autocompletado de una búsqueda en Google' },
        { type:'wild', text:'Completar con algo que conozcas y no esté en este cartón :)', label:'Nombre de la tecnología' },
        { type:'free' },
        { type:'free' },
        { type:'task', text:'Usar una app para reconocer una canción' },
        { type:'task', text:'Usar la autocorrección de texto en WhatsApp' },
      ]
    },
    {
      id: 2, num: '0000002', color: 'var(--c2)',
      cells: [
        { type:'free' },
        { type:'task', text:'Ver el autocompletado de una búsqueda en Google' },
        { type:'task', text:'Jugar un videojuego en el que controlás los personajes con el cuerpo' },
        { type:'task', text:'Usar un buscador online como Google o Bing' },
        { type:'wild', text:'Completar con algo que no conozcas y no esté en este cartón :)', label:'Nombre de la tecnología' },
        { type:'free' },
        { type:'task', text:'Usar un filtro de Snapchat o Instagram' },
        { type:'free' },
        { type:'task', text:'Que una computadora les evalúe una tarea' },
      ]
    },
    {
      id: 3, num: '0000003', color: 'var(--c3)',
      cells: [
        { type:'task', text:'Ver un producto promocionado en Google o un aviso que dice "ya que usted compró... puede estar interesado en..."' },
        { type:'free' },
        { type:'task', text:'Obtener un emoji sugerido en lugar de una palabra' },
        { type:'free' },
        { type:'wild', text:'Completar con algo que no conozcas y no esté en este cartón :)', label:'Nombre de la tecnología' },
        { type:'task', text:'Usar un buscador online como Google o Bing' },
        { type:'task', text:'Comunicarse con algún servicio por un chatbot' },
        { type:'task', text:'Usar la autocorrección de texto en WhatsApp' },
        { type:'free' },
      ]
    },
    {
      id: 4, num: '0000004', color: 'var(--c4)',
      cells: [
        { type:'task', text:'Usar la huella digital o el rostro para desbloquear el celular' },
        { type:'task', text:'Usar la autocorrección de texto en WhatsApp' },
        { type:'free' },
        { type:'free' },
        { type:'wild', text:'Completar con algo que conozcas y no esté en este cartón :)', label:'Nombre de la tecnología' },
        { type:'task', text:'Ver una publicidad sugerida en TikTok o Instagram' },
        { type:'task', text:'Obtener un emoji sugerido en lugar de una palabra' },
        { type:'free' },
        { type:'task', text:'Escuchar una canción recomendada en Spotify' },
      ]
    },
  ];

  // in-memory answers per card, keyed by cardId -> array of 9 strings
  const state = {};
  CARDS.forEach(c => { state[c.id] = new Array(9).fill(''); });

  const LINES = [
    [0,1,2],[3,4,5],[6,7,8],
    [0,3,6],[1,4,7],[2,5,8],
    [0,4,8],[2,4,6]
  ];

  // ---------- SELECTOR RENDER ----------
  const ticketsEl = document.getElementById('tickets');
  CARDS.forEach(card => {
    const btn = document.createElement('button');
    btn.className = 'ticket';
    btn.style.setProperty('--tc', card.color);
    btn.setAttribute('aria-label', 'Elegir cartón ' + card.id);

    const mini = card.cells.map(c => c.type === 'free' ? '<i class="on"></i>' : '<i></i>').join('');

    btn.innerHTML = `
      <div class="num">Cartón N°</div>
      <div class="digit">0${card.id}</div>
      <div class="mini-grid">${mini}</div>
      <div class="cta">jugar este cartón</div>
    `;
    btn.addEventListener('click', () => openCard(card.id));
    ticketsEl.appendChild(btn);
  });

  // ---------- CARD VIEW ----------
  const selectorSec = document.getElementById('selector');
  const cardviewSec = document.getElementById('cardview');
  const boardEl = document.getElementById('board');
  const gridEl = document.getElementById('grid');
  const cardNumEl = document.getElementById('cardNum');
  const progressLabel = document.getElementById('progressLabel');
  const bingoBanner = document.getElementById('bingoBanner');

  let currentCardId = null;

  function openCard(id){
    currentCardId = id;
    const card = CARDS.find(c => c.id === id);
    boardEl.style.setProperty('--card-c', card.color);
    cardNumEl.textContent = 'Cartón N° ' + card.num;
    cardNumEl.style.color = card.color;
    renderGrid(card);
    selectorSec.style.display = 'none';
    cardviewSec.style.display = 'block';
    window.scrollTo({top:0, behavior:'smooth'});
  }

  function renderGrid(card){
    gridEl.innerHTML = '';
    bingoBanner.classList.remove('show');
    card.cells.forEach((cell, i) => {
      const div = document.createElement('div');
      div.className = 'cell ' + cell.type;
      div.dataset.index = i;

      if (cell.type === 'free'){
        div.innerHTML = `<span class="free-mark">LIBRE</span>`;
      } else {
        const label = cell.type === 'wild' ? cell.label : 'Nombre';
        const val = state[card.id][i] || '';
        div.innerHTML = `
          <div class="task-text">${cell.text}</div>
          <div>
            <input type="text" placeholder="" value="${escapeHtml(val)}" data-i="${i}">
            <div class="caption">${label}</div>
          </div>
        `;
        if (val.trim() !== '') div.classList.add('filled');
      }
      gridEl.appendChild(div);
    });

    gridEl.querySelectorAll('input').forEach(inp => {
      inp.addEventListener('input', onInput);
    });

    updateProgress();
    checkLines();
  }

  function onInput(e){
    const i = parseInt(e.target.dataset.i, 10);
    state[currentCardId][i] = e.target.value;
    const cellEl = e.target.closest('.cell');
    cellEl.classList.toggle('filled', e.target.value.trim() !== '');
    updateProgress();
    checkLines();
  }

  function isMarked(card, i){
    const cell = card.cells[i];
    if (cell.type === 'free') return true;
    return (state[card.id][i] || '').trim() !== '';
  }

  function updateProgress(){
    const card = CARDS.find(c => c.id === currentCardId);
    const count = card.cells.reduce((acc, _, i) => acc + (isMarked(card, i) ? 1 : 0), 0);
    progressLabel.textContent = count + ' / 9 completados';
  }

  function checkLines(){
    const card = CARDS.find(c => c.id === currentCardId);
    const cellsEls = gridEl.querySelectorAll('.cell');
    cellsEls.forEach(el => el.classList.remove('line-hit'));

    let hit = false;
    LINES.forEach(line => {
      if (line.every(i => isMarked(card, i))){
        hit = true;
        line.forEach(i => cellsEls[i].classList.add('line-hit'));
      }
    });
    bingoBanner.classList.toggle('show', hit);
  }

  function escapeHtml(str){
    return str.replace(/[&<>"']/g, s => ({
      '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;'
    }[s]));
  }

  document.getElementById('backBtn').addEventListener('click', () => {
    cardviewSec.style.display = 'none';
    selectorSec.style.display = 'block';
    window.scrollTo({top:0, behavior:'smooth'});
  });

  document.getElementById('resetBtn').addEventListener('click', () => {
    state[currentCardId] = new Array(9).fill('');
    const card = CARDS.find(c => c.id === currentCardId);
    renderGrid(card);
  });
</script>

</body>
</html>
